<!DOCTYPE html> 
<html lang="vi">
<head>
<title> Trang tinh dien tich hinh chu nhat  </title>  
<meta charset="utf-8"> 

</head>
<body> 

<script>

 let d = Number( prompt("Hãy nhập chiều dài hình chữ nhật "));

 let r = Number( prompt("Hãy nhập chiều rộng hình chữ nhật"));
 if(d<r) 
 alert ("Chiều Dài Nhỏ hơn Chiều Rộng rồi hãy nhập lại ");
 else 
 if(d==r) 
 alert("Trường hợp đặc biệt là hình vuông " + d*r );
 else 
   alert("Diện tích hình chữ nhật là " + d*r );
 


</script> 








</body>



</html>
