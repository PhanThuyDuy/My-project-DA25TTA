<!DOCTYPE html> 
<html lang="vi">
<head>
<title> Trang chủ </title>  
<meta charset="utf-8"> 
 
<link rel="stylesheet" href="../css/style7.css">


</head>
<body> 

<table>
	<tr>
		<th > STT </th>
		<th>Tên hàng hóa </th>
		<th> Số lượng 	</th>
		<th> Đơn giá </th>
		<th> ĐVT </th>
		<th> Thành tiền </th>
	</tr>
	<tr>
		<td > 1 </td>
		<td> Mì coluna </td>
		<td class="soluong"> 2 </td>
		<td class="dongia"> 105 </td>
		<td> thùng </td>
		<td class="thanhtien"> ? </td>
	</tr>
	
	<tr>
		<td > 2 </td>
		<td> Sữa ông thọ </td>
		<td class="soluong"> 4 </td>
		<td class="dongia"> 200 </td>
		<td> thùng </td>
		<td class="thanhtien"> ? </td>
	</tr>
	
	<tr>
		<td > 3 </td>
		<td> Xúc xích cp</td>
		<td class="soluong"> 120 </td>
		<td class="dongia"> 45 </td>
		<td> túi </td>
		<td class="thanhtien"> ? </td>
	</tr>
    
	<tr>
		<td > 4 </td>
		<td> dầu gội đầu</td>
		<td class="soluong"> 20 </td>
		<td class="dongia"> 150 </td>
		<td> chai </td>
		<td class="thanhtien"> ? </td>
	</tr>


<tr>  <td colspan="6" id ="thanhtoan"> ? </td>  </tr>

</table> 

<script>
let sl = document.getElementsByClassName("soluong");
let dg = document.getElementsByClassName("dongia");		
let tt = document.getElementsByClassName("thanhtien");
let tongthanhtoan = 0; 
for (let i = 0; i < sl.length; i++) {
	tt[i].innerHTML = Number(sl[i].innerHTML) * Number(dg[i].innerHTML);
	tongthanhtoan += Number(tt[i].innerHTML);
}
document.getElementById("thanhtoan").innerHTML = `Tổng thành tiền: ${tongthanhtoan} VNĐ `;

</script> 


</body>



</html>
